<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>G-Bay</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
    }
    .card {
      width: 360px;
      max-width: 92vw;
      padding: 24px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 10px 25px rgba(0,0,0,.08);
      text-align: center;
    }
    h1 { margin: 0 0 6px; }
    p { margin: 0 0 16px; color: #555; }
    .btn {
      display: block;
      width: 90%;
      padding: 10px;
      margin-top: 12px;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      font-weight: bold;
      text-decoration: none;
      text-align: center;
    }    
  </style>
</head>
<body>
  <div class="card">
    <h1>G-Bay</h1>
    <p>Welcome to G-Bay</p>

    <a class="btn" href="login.html">Login</a>
    <a class="btn" href="register.html">New User? Register</a>
  </div>
</body>
</html>
