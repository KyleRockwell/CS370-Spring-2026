<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>GBay Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
    }
    .card {
      width: 340px;
      padding: 24px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
      box-shadow: 0 10px 25px rgba(0,0,0,.08);
    }
    h1 { margin: 0 0 6px; }
    p  { margin: 0 0 14px; color: #555; font-size: 14px; }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      box-sizing: border-box;
      border: 1px solid #d1d5db;
      border-radius: 8px;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 16px;
      border: 0;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>GBay</h1>
    <p>Sign in with your email and password.</p>

    <form method="post" action="cgi-bin/login.cgi">
      <input type="hidden" name="action" value="login">

      <label for="email">Email</label>
      <input id="email" name="email" type="Email" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" required>

      <button type="submit">Login</button>
    </form>

    <div class="link">
      New user? <a href="register.html">Create an account</a>
    </div>
  </div>
</body>
</html>
